<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>82TRADE 六維數據</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{font-family:"Noto Sans TC",system-ui}
.mono{font-family:"JetBrains Mono",monospace}
body{background:#0a0a0f;color:#e5e7eb}
.glass{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(236,72,153,.1));backdrop-filter:blur20px;border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card{transition:all.3s}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(139,92,246,.3)}
.btn{transition:all.2s}
.btn:active{transform:scale(.97)}
</style>
</head>
<body class="min-h-screen">
<div class="fixed inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-violet-900/40 via-transparent to-transparent"></div>

<header class="sticky top-0 z-50 glass border-b border-white/10">
<div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center font-bold text-white shadow-lg">82</div>
<h1 class="text-xl font-bold bg-gradient-to-r from-violet-300 to-fuchsia-300 bg-clip-text text-transparent">82TRADE 六維數據</h1>
</div>
<div id="time" class="mono text-sm text-zinc-400">--:--:--</div>
</div>
</header>

<main class="max-w-6xl mx-auto p-4 grid md:grid-cols-3 gap-5 mt-6">

<!-- 1 資金費率 -->
<div class="card glass rounded-3xl p-6">
<div class="flex justify-between items-start mb-3"><h2 class="text-zinc-300">資金費率</h2><span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span></div>
<div id="fr" class="mono text-4xl font-medium text-emerald-300">--.----%</div>
<p class="text-xs text-zinc-500 mt-1">Binance 8H</p>
</div>

<!-- 2 恐懼貪婪 -->
<div class="card glass rounded-3xl p-6">
<div class="flex justify-between items-start mb-3"><h2 class="text-zinc-300">恐懼與貪婪</h2><span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span></div>
<div id="fg" class="mono text-4xl font-medium text-amber-300">--</div>
<p class="text-xs text-zinc-500 mt-1">Alternative.me</p>
</div>

<!-- 3 BTC -->
<div class="card glass rounded-3xl p-6">
<div class="flex justify-between items-start mb-3"><h2 class="text-zinc-300">BTC 價格</h2><span class="w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span></div>
<div id="btc" class="mono text-4xl font-medium text-orange-300">$--</div>
<p class="text-xs text-zinc-500 mt-1">24H 變動 <span id="chg" class="text-zinc-400">--%</span></p>
</div>

<!-- 4 ETF -->
<div class="card glass rounded-3xl p-6 md:col-span-3">
<h2 class="text-lg font-semibold mb-4 text-violet-200">ETF 資金流 · 昨日數據</h2>
<div class="grid md:grid-cols-2 gap-4">
<div class="bg-black/30 rounded-2xl p-5 border border-white/5">
<div class="flex justify-between items-center mb-3"><span class="text-amber-200">BTC ETF</span><button onclick="getETF('btc')" id="btcBtn" class="btn px-4 py-2 rounded-xl bg-amber-500/20 hover:bg-amber-500/30 text-amber-100 text-sm">點擊抓取</button></div>
<div id="btcRes" class="mono text-3xl text-zinc-500">--</div>
</div>
<div class="bg-black/30 rounded-2xl p-5 border border-white/5">
<div class="flex justify-between items-center mb-3"><span class="text-violet-200">ETH ETF</span><button onclick="getETF('eth')" id="ethBtn" class="btn px-4 py-2 rounded-xl bg-violet-500/20 hover:bg-violet-500/30 text-violet-100 text-sm">點擊抓取</button></div>
<div id="ethRes" class="mono text-3xl text-zinc-500">--</div>
</div>
</div>
</div>

<!-- 5 URPD -->
<div class="card glass rounded-3xl p-6 md:col-span-2">
<h2 class="text-lg font-semibold mb-3 text-fuchsia-200">URPD 籌碼分佈</h2>
<p class="text-sm text-zinc-400 mb-4">點擊抓取即時成本密集區</p>
<button onclick="getURPD()" id="urpdBtn" class="btn w-full py-3 rounded-2xl bg-gradient-to-r from-fuchsia-600/30 to-violet-600/30 hover:from-fuchsia-600/40 hover:to-violet-600/40 border border-fuchsia-500/30 font-medium">抓取籌碼分佈</button>
<div id="urpdBox" class="mt-5 hidden">
<img id="urpdImg" class="w-full rounded-xl border border-white/10 bg-black/50" src="">
<div class="mt-3 grid grid-cols-3 gap-3 text-center">
<div class="bg-white/5 rounded-xl p-3"><div class="text-xs text-zinc-500">密集區</div><div class="mono text-fuchsia-300 mt-1">$62-66K</div></div>
<div class="bg-white/5 rounded-xl p-3"><div class="text-xs text-zinc-500">支撐</div><div class="mono text-emerald-300 mt-1">$60K</div></div>
<div class="bg-white/5 rounded-xl p-3"><div class="text-xs text-zinc-500">壓力</div><div class="mono text-red-300 mt-1">$68K</div></div>
</div>
</div>
</div>

<!-- 6 LTH -->
<div class="card glass rounded-3xl p-6">
<h2 class="text-lg font-semibold mb-3 text-teal-200">長期持有者</h2>
<div class="mono text-4xl text-teal-300">14.6M</div>
<p class="text-sm text-zinc-400 mt-2">佔流通 ~73%</p>
</div>

</main>

<script>
function tick(){document.getElementById('time').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false})}tick();setInterval(tick,1000);
async function upd(){try{document.getElementById('fr').textContent=(await fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1').then(r=>r.json()).then(d=>(d[0].fundingRate*100).toFixed(4)+'%'))}catch{}try{document.getElementById('fg').textContent=await fetch('https://api.alternative.me/fng/?limit=1').then(r=>r.json()).then(d=>d.data[0].value)}catch{}try{const d=await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT').then(r=>r.json());document.getElementById('btc').textContent='$'+Math.round(d.lastPrice).toLocaleString();document.getElementById('chg').textContent=(parseFloat(d.priceChangePercent)>=0?'+':'')+parseFloat(d.priceChangePercent).toFixed(2)+'%'}catch{}}upd();setInterval(upd,60000);

async function getETF(t){const b=document.getElementById(t+'Btn'),r=document.getElementById(t+'Res');b.disabled=1;b.textContent='抓取中...';try{const u=t==='btc'?'farside.co.uk/btc/':'farside.co.uk/eth/';const txt=await fetch('https://r.jina.ai/http://'+u).then(x=>x.text());const m=txt.match(/Total[^\d+-]*([+-]?[\d,]+\.?\d*)/i);if(m){const v=m[1];r.textContent='$'+v+'M';r.className='mono text-3xl '+(v.includes('-')?'text-red-400':'text-emerald-400')}else{r.textContent='請看官網';r.className='mono text-2xl text-zinc-400'}}catch{r.textContent='失敗'}b.disabled=0;b.textContent='重新抓取'}

function getURPD(){const b=document.getElementById('urpdBtn'),x=document.getElementById('urpdBox');b.textContent='載入中...';document.getElementById('urpdImg').src='https://cdn.coinglasscdn.com/assets/article/utxo-distribution.png?'+Date.now();x.classList.remove('hidden');setTimeout(()=>b.textContent='已更新',500)}
</script>
</body>
</html>
