<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>82THRED 六維數據 - 穩定版</title>
<meta name="theme-color" content="#050507">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    * { font-family: "Noto Sans TC", system-ui, -apple-system, sans-serif; }
 .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  body { background: #050507; }
 .glass { background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
 .card { transition: transform.2s ease, border-color.2s ease, background.2s ease; }
 .card:hover { transform: translateY(-2px); border-color: rgba(139,92,246,0.4); }
 .dot { width: 8px; height: 8px; border-radius: 50%; }
 .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
 .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
 .bg-grid { background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px); background-size: 24px 24px; }
</style>
</head>
<body class="text-zinc-100 antialiased selection:bg-violet-500/30 selection:text-violet-200">
<div class="fixed inset-0 -z-10">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-violet-950/30 via-transparent to-transparent"></div>
  <div class="absolute top-[-20%] right-[-10%] w- h- bg-fuchsia-600/20 rounded-full blur-"></div>
  <div class="absolute bottom-[-30%] left-[-10%] w- h- bg-blue-600/20 rounded-full blur-"></div>
  <div class="absolute inset-0 bg-grid opacity-[0.15]"></div>
</div>

<header class="sticky top-0 z-40 border-b border-white/5 glass">
  <div class="max-w- mx-auto px-4 sm:px-6 h- flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 to-fuchsia-600 flex items-center justify-center shadow-lg shadow-violet-900/30">
        <span class="font-bold text-white tracking-wider">82</span>
      </div>
      <div class="min-w-0">
        <h1 class="text- sm:text- font-semibold tracking-wide truncate">82THRED 六維數據 - 穩定版</h1>
        <p class="text- text-zinc-500 -mt-1 hidden sm:block">Stable • Dark • Mobile First</p>
      </div>
    </div>
    <div class="flex items-center gap-2 sm:gap-4">
      <div class="text-right">
        <div class="text- text-zinc-500 leading-none">最後更新</div>
        <div id="lastUpdate" class="mono text- sm:text- text-zinc-300 mt-0.5">--:--:--</div>
      </div>
      <button id="refreshBtn" class="group flex items-center gap-1.5 px-3 sm:px-3.5 h-9 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 hover:border-violet-500/50 transition active:scale-[0.98]">
        <svg id="refreshIcon" class="w-4 h-4 text-zinc-300 group-hover:text-white transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span class="text- hidden sm:inline">重新整理</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w- mx-auto px-4 sm:px-6 py-6 sm:py-8">
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-5">

    <!-- 1 資金費率 -->
    <div class="card glass rounded- p-5 sm:p-6">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="flex items-center gap-2">
            <div class="dot bg-emerald-400 pulse" id="fundingDot"></div>
            <h2 class="text- font-medium text-zinc-200">資金費率</h2>
          </div>
          <p class="text- text-zinc-500 mt-1">Binance BTCUSDT 永續</p>
        </div>
      <div class="space-y-3">
        <div>
          <div id="fundingRate" class="mono text- leading-none font-medium tracking-tight">--.----%</div>
          <div class="text- text-zinc-500 mt-1">8小時費率</div>
        </div>
        <div class="flex items-center justify-between pt-3 border-t border-white/5">
          <span class="text- text-zinc-500">結算時間</span>
          <span id="fundingTime" class="mono text- text-zinc-300">--</span>
        </div>
      </div>
    </div>

    <!-- 2 恐懼貪婪 -->
    <div class="card glass rounded- p-5 sm:p-6">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="flex items-center gap-2">
            <div class="dot bg-amber-400 pulse" id="fngDot"></div>
            <h2 class="text- font-medium text-zinc-200">恐懼與貪婪</h2>
          </div>
          <p class="text- text-zinc-500 mt-1">Alternative.me 指數</p>
        </div>
      </div>
      <div class="space-y-4">
        <div class="flex items-baseline gap-3">
          <div id="fngValue" class="mono text- leading-none font-medium">--</div>
          <div id="fngText" class="text- px-2.5 py-1 rounded-lg bg-white/5 border border-white/10 text-zinc-300">載入中</div>
        </div>
        <div>
          <div class="h-2 w-full rounded-full bg-white/5 overflow-hidden">
            <div id="fngBar" class="h-full w-[50%] rounded-full transition-all duration-700" style="background: linear-gradient(90deg,#ef4444,#f59e0b,#eab308,#84cc16,#22c55e)"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3 BTC價格 -->
    <div class="card glass rounded- p-5 sm:p-6">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="flex items-center gap-2">
            <div class="dot bg-orange-400 pulse" id="btcDot"></div>
            <h2 class="text- font-medium text-zinc-200">BTC 價格</h2>
          </div>
          <p class="text- text-zinc-500 mt-1">Binance 現貨 24H</p>
        </div>
      </div>
      <div class="space-y-3">
        <div>
          <div id="btcPrice" class="mono text- leading-none font-medium tracking-tight">$--,---</div>
          <div class="flex items-center gap-2 mt-1.5">
            <span id="btcChange" class="text- px-2 py-0.5 rounded-md mono font-medium bg-white/5 border border-white/10">--%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 4 ETF -->
    <div class="card glass rounded- p-5 sm:p-6">
      <h2 class="text- font-medium text-zinc-200 mb-3">ETF 資金流</h2>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm text-zinc-400">BTC ETF</div>
            <div id="btcOut" class="mono text-xl text-zinc-500">未抓取</div>
          </div>
          <button id="btcBtn" onclick="fetchEtf('btc')" class="px-3 h-8 rounded-lg bg-amber-500/20 hover:bg-amber-500/30 text-amber-200 text-sm border-amber-500/30">抓取</button>
        </div>
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm text-zinc-400">ETH ETF</div>
            <div id="ethOut" class="mono text-xl text-zinc-500">未抓取</div>
          </div>
          <button id="ethBtn" onclick="fetchEtf('eth')" class="px-3 h-8 rounded-lg bg-violet-500/20 hover:bg-violet-500/30 text-violet-200 text-sm border border-violet-500/30">抓取</button>
        </div>
      </div>
    </div>

    <!-- 5 URPD -->
    <div class="card glass rounded- p-5 sm:p-6">
      <h2 class="text- font-medium text-zinc-200">URPD 籌碼分佈</h2>
      <p class="text- text-zinc-400 my-3">觀察比特幣鏈上成本密集區</p>
      <a href="https://www.coinglass.com/pro/i/utxo" target="_blank" class="inline-flex items-center gap-2 px-4 h-11 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10">
        <span>開啟 URPD 圖表</span>
      </a>
    </div>

    <!-- 6 長期持有者 -->
    <div class="card glass rounded- p-5 sm:p-6">
      <h2 class="text- font-medium text-zinc-200">長期持有者</h2>
      <div class="mono text- mt-3">14.6M</div>
      <p class="text- text-zinc-400">約佔流通量 ~73%</p>
    </div>

  </div>
</main>

<script>
const $ = id => document.getElementById(id);
async function updateFunding(){
  try{
    const data = await fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1').then(r=>r.json());
    const rate = parseFloat(data[0].fundingRate)*100;
    $('fundingRate').textContent = (rate>=0?'+':'')+rate.toFixed(4)+'%';
    $('fundingTime').textContent = new Date(data[0].fundingTime).toLocaleString('zh-TW',{hour12:false});
  }catch{}
}
async function updateFNG(){
  try{
    const d = await fetch('https://api.alternative.me/fng/?limit=1').then(r=>r.json());
    $('fngValue').textContent = d.data[0].value;
    $('fngText').textContent = d.data[0].value_classification;
    $('fngBar').style.width = d.data[0].value+'%';
  }catch{}
}
async function updateBTC(){
  try{
    const d = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT').then(r=>r.json());
    $('btcPrice').textContent = '$'+Math.round(d.lastPrice).toLocaleString();
    $('btcChange').textContent = (parseFloat(d.priceChangePercent)>=0?'+':'')+parseFloat(d.priceChangePercent).toFixed(2)+'%';
  }catch{}
}
async function fetchEtf(type){
  const btn = $(type+'Btn'), out = $(type+'Out');
  btn.disabled=true; btn.textContent='抓取中...';
  try{
    const url = type==='btc'?'https://farside.co.uk/btc/':'https://farside.co.uk/eth/';
    const txt = await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url)).then(r=>r.text());
    const m = txt.match(/Total[\s\S]{0,200}?([+-]?[\d,]+\.\d+)/);
    out.textContent = m? '$'+m[1] : '解析失敗';
  }catch{ out.textContent='失敗'; }
  btn.disabled=false; btn.textContent='重新抓取';
}
function updateAll(){ updateFunding(); updateFNG(); updateBTC(); $('lastUpdate').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false}); }
$('refreshBtn').onclick = updateAll;
updateAll(); setInterval(updateAll,60000);
</script>
</body>
</html>
